[project]
name = "lumen-sdk"
version = "0.1.0"
description = "Lumen pipeline server framework — FastAPI on Modal"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "httpx>=0.28.0",
    "modal>=0.73.0",
    "pydantic>=2.0.0",
]

[project.scripts]
lumen-sdk = "lumen_sdk.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lumen_sdk"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
